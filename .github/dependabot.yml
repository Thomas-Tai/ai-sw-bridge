# Dependabot — automated dependency-update PRs (audit SEC-3).
# Covers the Python runtime/dev deps (pyproject + requirements.txt) and the
# GitHub Actions used by the workflows.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
