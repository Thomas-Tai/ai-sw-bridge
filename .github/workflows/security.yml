name: Security

# Secret scanning + dependency CVE audit (audit SEC-2 / SEC-3). Kept separate
# from ci.yml so a scanner hiccup never blocks the test/release gate. Runs on
# pushes/PRs and weekly.
on:
  push:
    branches: [master, "feat/**"]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        # Honors the repo-root .gitleaksignore allowlist (documented SOLIDWORKS
        # sketch-relation enum false positives from the W68 IP-scrub).
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pip-audit:
    # Runs on Windows because pywin32 (a runtime dep) is Windows-only and must
    # resolve for the audit to see the full installed tree.
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install project + pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip install -e .
      - name: Audit installed dependencies for known CVEs
        # BLOCKING as of v1.6.0: a known CVE in a runtime dependency fails the
        # build. Triage an accepted / awaiting-upstream-fix advisory explicitly
        # with `pip-audit --ignore-vuln <GHSA-id> --desc` (record the rationale in
        # docs/SECURITY.md Appendix A).
        run: pip-audit --desc
