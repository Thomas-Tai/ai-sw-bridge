name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install black

      - name: Check formatting
        run: black --check .

      - name: Run tests
        run: pytest -v

  import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (no pywin32)
        run: |
          python -m pip install --upgrade pip
          # Install without pywin32 (not available on Linux) to verify
          # lazy imports work — the package should import cleanly even
          # without pywin32 installed.
          pip install jsonschema

      - name: Verify lazy import
        run: |
          # pywin32-dependent modules should not load on import
          PYTHONPATH=src python -c "import ai_sw_bridge; print(ai_sw_bridge.__version__)"
