name: CI

on:
  push:
    branches: [master, "v*-integration", "feat/**"]
  pull_request:
    branches: [master]

jobs:
  test:
    # Pin the runner explicitly rather than tracking `windows-latest`.
    # GitHub announced (2026-05) that windows-latest will redirect to
    # windows-2025-vs2026 on 2026-06-15; pinning avoids the implicit
    # swap. Bump intentionally when we want the newer image.
    runs-on: windows-2025
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      # v5 runs on Node 24; v4 ran on Node 20 which GitHub announced
      # is deprecated and will be removed from runners 2026-09-16.
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        # v6 runs on Node 24; v5 ran on Node 20. Our usage (just
        # python-version + pip install) is on the stable surface;
        # v6's breaking changes are in caching / pyproject.toml
        # consumption which we don't use.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # [dev] = formatter/linter/test harness; [ci] = optional runtime
          # deps (mcp, keyring) that gate importorskip'd tests. Splitting
          # them keeps local `pip install -e .[dev]` lean while letting the
          # full-suite CI job collect every MCP-lane + keyring-crypto test.
          pip install -e ".[dev,ci]"
          # Pin black to the same version listed in pyproject.toml dev extras.
          # Without a pin, `pip install black` here would get whichever is
          # latest at CI runtime, and black's formatting rules change
          # between minor releases -- producing "would reformat" diffs on
          # files that were clean against the previous version.
          pip install "black==25.12.0"

      - name: Check formatting
        run: black --check .

      - name: Lint (flake8)
        # Logical-defect lint (F-codes, E4xx/E7xx). Line length is owned by
        # black (E501 is delegated in .flake8), so this never conflicts with
        # the formatter. Driven to zero 2026-06-25; new violations fail CI.
        run: flake8 src/

      - name: Type check (mypy)
        # Pinned to mypy==2.1.0 (pyproject dev extras) so local + CI agree.
        # Driven to zero 2026-06-25; new type errors fail CI.
        run: mypy --config-file mypy.ini src/ai_sw_bridge

      - name: Doc coverage gate
        # Fails if any schema.ALL_TYPES feature type lacks a section in
        # docs/spec_reference.md (enhancement plan P1.5).
        run: python tools/doc_coverage_gate.py

      - name: Two-stream contract lint
        # Fails if any src/ module violates the JSON-on-stdout / text-on-stderr
        # contract (UIUX.md §2.3).
        run: python tools/two_stream_lint.py src/

      - name: Module-size budget gate (warn)
        # Warn-only in Phase 0: prints modules that grew past their baseline or
        # new modules over the 800-LOC ceiling, but does not fail the build.
        # Promoted to --strict in Phase 3 once builder.py is decomposed.
        run: python tools/module_size_gate.py

      - name: Import-linter lane-boundary contracts
        # Layer contract lives in pyproject [tool.importlinter]. It silently
        # drifted from W9–W36 because nothing enforced it (caught 2026-06-11);
        # this step keeps it honest.
        run: lint-imports

      - name: Run tests
        run: pytest -v --cov=ai_sw_bridge --cov-report=term-missing --cov-report=json

      - name: Coverage ratchet gate
        # Replaces the fixed --cov-fail-under=60 floor. Fails if total coverage
        # drops > 1pt below the checked-in baseline, or a watched package
        # (spec/features/errors) falls below its floor. Bump the baseline via a
        # reviewed PR (python tools/coverage_gate.py --update-baseline).
        run: python tools/coverage_gate.py

  import-check:
    # Pin runner version (see comment on test job).
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install (no pywin32)
        run: |
          python -m pip install --upgrade pip
          # Install without pywin32 (not available on Linux) to verify
          # lazy imports work — the package should import cleanly even
          # without pywin32 installed.
          pip install jsonschema

      - name: Verify lazy import
        run: |
          # pywin32-dependent modules should not load on import
          PYTHONPATH=src python -c "import ai_sw_bridge; print(ai_sw_bridge.__version__)"

  onboarding:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # User-perspective install (no [dev] extras) + pytest so the
          # quickstart smoke test can actually run. Adding pytest alone
          # keeps the install footprint close to what a new contributor
          # would set up, without pulling black/mypy/flake8.
          pip install -e . pytest

      - name: Quickstart smoke test
        run: pytest -m onboarding -v

  operator-install-smoke:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - name: Install the built artifact (not -e)
        shell: pwsh
        run: |
          $whl = Get-ChildItem dist/*.whl | Select-Object -First 1
          pip install "$($whl.FullName)[mcp]"
      - name: Scripts are on PATH
        shell: pwsh
        run: |
          where.exe ai-sw-probe
          if ($LASTEXITCODE -ne 0) { throw "ai-sw-probe not on PATH" }
          where.exe ai-sw-mcp
          if ($LASTEXITCODE -ne 0) { throw "ai-sw-mcp not on PATH" }
          where.exe ai-sw-doctor
          if ($LASTEXITCODE -ne 0) { throw "ai-sw-doctor not on PATH" }
      - name: No-SW command works (list kinds)
        run: ai-sw-build --list-kinds
      - name: probe/doctor fail gracefully with no SW (exit 1, no traceback)
        shell: pwsh
        run: |
          $doc = ai-sw-doctor --no-seat 2>&1
          if ($LASTEXITCODE -ne 1 -and $LASTEXITCODE -ne 0) {
            throw "ai-sw-doctor --no-seat exited $LASTEXITCODE (want 0/1)"
          }
          if ($doc -match "Traceback") { throw "ai-sw-doctor leaked a traceback" }
          $out = ai-sw-probe 2>&1
          if ($LASTEXITCODE -ne 1) { throw "ai-sw-probe exited $LASTEXITCODE (want 1 with no seat)" }
          if ($out -match "Traceback") { throw "ai-sw-probe leaked a traceback" }
      - name: MCP server module imports
        run: python -c "import ai_sw_bridge.mcp.server; print('mcp ok')"
