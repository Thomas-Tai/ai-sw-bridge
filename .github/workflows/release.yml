name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # A tag push must NOT publish a release off an untested commit. This job
  # re-runs the core gates (format + lint + architecture + the offline suite)
  # and `release` depends on it, so a red commit can never be tagged into a
  # signed, published artifact. (ci.yml runs on branches/PRs, not on tags, and
  # a workflow cannot `needs:` a job in another workflow — hence this guard.)
  test:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ci]"
          pip install "black==25.12.0"

      - name: Check formatting
        run: black --check .

      - name: Lint (flake8)
        run: flake8 src/

      - name: Type check (mypy)
        run: mypy --config-file mypy.ini src/ai_sw_bridge

      - name: Import-linter lane-boundary contracts
        run: lint-imports

      - name: Run tests
        run: pytest -q

  release:
    needs: [test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Compute SHA-256 checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.whl > ../checksums.txt
          cat ../checksums.txt

      - name: Sign checksums with GPG
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_SIGNING_KEY" | gpg --import --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE"
          gpg --default-key "ai-sw-bridge-release" --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --detach-sign --armor checksums.txt

      - name: Generate release notes
        id: release_notes
        run: |
          # Get the prior tag (or empty if this is the first)
          PRIOR_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PRIOR_TAG" ]; then
            RANGE="${PRIOR_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          # Try CHANGELOG.md first; fall back to commit log
          if [ -f CHANGELOG.md ]; then
            # Extract the section for this version
            TAG_NAME="${GITHUB_REF_NAME}"
            NOTES=$(sed -n "/^## \[${TAG_NAME#v}\]/,/^## \[/p" CHANGELOG.md | head -n -1)
            if [ -z "$NOTES" ]; then
              NOTES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges)
            fi
          else
            NOTES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Write to file for multiline GITHUB_OUTPUT
          echo "$NOTES" > /tmp/release_notes.txt
          echo "path=/tmp/release_notes.txt" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
            checksums.txt
            checksums.txt.asc
          body_path: ${{ steps.release_notes.outputs.path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
