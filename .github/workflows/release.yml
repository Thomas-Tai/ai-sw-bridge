name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  # A tag push must NOT publish a release off an untested commit. This job
  # re-runs the core gates (format + lint + architecture + the offline suite)
  # and `release` depends on it, so a red commit can never be tagged into a
  # signed, published artifact. (ci.yml runs on branches/PRs, not on tags, and
  # a workflow cannot `needs:` a job in another workflow — hence this guard.)
  test:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history: the offline suite runs tests/test_i18n_staleness.py,
          # which shells out to git rev-list / cat-file against each mirror's
          # translated-from baseline SHA. A shallow (depth-1) clone can't reach
          # those SHAs, so every mirror-existence check fails — as it did on the
          # first REAL workflow_dispatch. ci.yml's test job already pins
          # fetch-depth:0 for the same gate; keep the two in lockstep.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ci]"
          pip install "black==25.12.0"

      - name: Check formatting
        run: black --check .

      - name: Lint (flake8)
        run: flake8 src/

      - name: Type check (mypy)
        run: mypy --config-file mypy.ini src/ai_sw_bridge

      - name: Import-linter lane-boundary contracts
        run: lint-imports

      - name: Run tests
        run: pytest -q --cov=ai_sw_bridge --cov-fail-under=60

  release:
    needs: [test]
    # Publish a GitHub Release only on a real tag push. On workflow_dispatch
    # (used to smoke-test the installer job) this job is skipped so no spurious
    # release is minted off a branch ref.
    if: github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    # GPG signing is OPTIONAL: sign only when a signing key is configured
    # (secrets are surfaced at the job level so the sign step's `if` can read
    # them — `if` cannot reference `secrets` directly). With no key set the
    # release publishes unsigned checksums, consistent with this project's
    # unsigned-installer / zero-budget posture.
    env:
      GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Compute SHA-256 checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.whl > ../checksums.txt
          cat ../checksums.txt

      - name: Sign checksums with GPG (skipped when no signing key is configured)
        if: env.GPG_SIGNING_KEY != ''
        run: |
          echo "$GPG_SIGNING_KEY" | gpg --import --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE"
          gpg --default-key "ai-sw-bridge-release" --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --detach-sign --armor checksums.txt

      - name: Generate release notes
        id: release_notes
        run: |
          # Get the prior tag (or empty if this is the first)
          PRIOR_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PRIOR_TAG" ]; then
            RANGE="${PRIOR_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          # Try CHANGELOG.md first; fall back to commit log
          if [ -f CHANGELOG.md ]; then
            # Extract the section for this version
            TAG_NAME="${GITHUB_REF_NAME}"
            NOTES=$(sed -n "/^## \[${TAG_NAME#v}\]/,/^## \[/p" CHANGELOG.md | head -n -1)
            if [ -z "$NOTES" ]; then
              NOTES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges)
            fi
          else
            NOTES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Write to file for multiline GITHUB_OUTPUT
          echo "$NOTES" > /tmp/release_notes.txt
          echo "path=/tmp/release_notes.txt" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # checksums.txt.asc only exists when a GPG key is configured (see the
          # optional sign step); don't fail the release when it's absent.
          fail_on_unmatched_files: false
          files: |
            dist/*.tar.gz
            dist/*.whl
            checksums.txt
            checksums.txt.asc
          body_path: ${{ steps.release_notes.outputs.path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}

  installer:
    # Build the unsigned Windows installer. needs:[test] so a red commit can
    # never be minted into a published artifact. Attaches to the Release on a
    # tag; on workflow_dispatch it only uploads a workflow artifact (no publish).
    needs: [test]
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Ensure Inno Setup (ISCC) is available
        shell: pwsh
        run: |
          $iscc = Get-Command ISCC.exe -ErrorAction SilentlyContinue
          if (-not $iscc) { choco install innosetup --no-progress -y }

      - name: Build the installer
        shell: pwsh
        run: |
          $ver = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME.TrimStart('v') } else { "0.0.0-dev" }
          python tools/build_installer.py --version $ver

      - name: Silent-install smoke (COM-free)
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist/ai-sw-bridge-setup-*.exe | Select-Object -First 1
          if (-not $exe) { throw "installer .exe not produced" }
          Start-Process -FilePath $exe.FullName -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART' -Wait
          $root = Join-Path $env:LOCALAPPDATA 'Programs\ai-sw-bridge'
          $build = Join-Path $root 'runtime\Scripts\ai-sw-build.exe'
          if (-not (Test-Path $build)) { throw "ai-sw-build.exe missing after install" }
          & $build --list-kinds
          if ($LASTEXITCODE -ne 0) { throw "ai-sw-build --list-kinds failed" }
          & (Join-Path $root 'runtime\python.exe') -c "import win32com.client; print('pywin32 ok')"
          if ($LASTEXITCODE -ne 0) { throw "pywin32 import failed (postinstall)" }
          & (Join-Path $root 'runtime\python.exe') -c "import ai_sw_bridge.mcp.server; print('mcp ok')"
          if ($LASTEXITCODE -ne 0) { throw "mcp server import failed" }

      - name: Attach installer to the Release (tag runs only)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ai-sw-bridge-setup-*.exe

      - name: Upload installer artifact (workflow_dispatch runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ai-sw-bridge-installer
          path: dist/ai-sw-bridge-setup-*.exe
