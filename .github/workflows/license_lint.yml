name: License lint

on:
  push:
    branches: [master, "feat/**"]
    paths:
      - "src/**"
      - "CONTRIBUTING.md"
      - "README.md"
      - "LICENSE"
      - "THIRD-PARTY-NOTICES.md"
      - "pyproject.toml"
  pull_request:
    branches: [master]
    paths:
      - "src/**"
      - "CONTRIBUTING.md"
      - "README.md"
      - "LICENSE"
      - "THIRD-PARTY-NOTICES.md"
      - "pyproject.toml"

jobs:
  license-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # BLOCKING as of v1.6.0 (the clean cycle has passed): a license/attribution
      # regression — the proprietary LICENSE, the pyproject license declaration, or
      # the THIRD-PARTY-NOTICES MIT attribution for the bundled SolidworksMCP-python
      # port — now fails the build. See harvest_plan.md §9.2.
      - name: Run license lint
        run: python tools/license_lint.py src/
