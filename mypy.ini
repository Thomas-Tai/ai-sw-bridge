# mypy configuration for ai-sw-bridge.
#
# Ported from pyrightconfig.json (enhancement plan P2.1). pyrightconfig.json
# carries no explicit excludes; the COM-driving surface is late-bound and
# dynamically typed by design -- see src/ai_sw_bridge/_sw_stubs/README.md for
# why EnsureDispatch (early binding) is deliberately not used.
[mypy]
python_version = 3.10
files = src
# pywin32 / win32com ship no type information; the COM objects are late-bound
# Dispatch handles. Don't flag those imports as missing-stub errors.
ignore_missing_imports = True
warn_unused_ignores = True
no_implicit_optional = True
warn_redundant_casts = True

# sw_com and the spec builder drive late-bound COM Dispatch objects: attribute
# access on them is dynamically typed and cannot be checked statically.
[mypy-ai_sw_bridge.sw_com]
disallow_untyped_defs = False

# Extension-model spine: new capability modules must be fully typed. The COM
# surface stays Any (see [mypy-ai_sw_bridge.sw_com]); this covers the pure-Python
# registration/dispatch layer only. Expanded to spec.handlers/cli/mcp.tools in
# later phases.
[mypy-ai_sw_bridge.features.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True

# Phase 3: the decomposed spec-build handler leaf (spec/handlers/*). Pure-Python
# (ctx: BuildContext, feat) -> BuiltFeature bodies relocated byte-identical from
# builder.py; the COM surface reached through ctx.doc stays Any. Same strictness
# as features.* -- the "expanded to spec.handlers in later phases" note above.
[mypy-ai_sw_bridge.spec.handlers.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True
